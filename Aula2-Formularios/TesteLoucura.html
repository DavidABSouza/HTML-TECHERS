<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1><strike>Formulário de Loucura</strike></h1>
    <h1><strong>Formulário de Cadastro</strong></h1>
    <form action="">
        <label for="pnome">Primeiro Nome:</label><br>
        <input type="text" id="pnome" name="pnome"><br><br>
        <label for="snome">Segundo Nome:</label><br>
        <input type="text" id="snome" name="snome"><br><br>
        <label for="data de nascimento">Data de Nascimento:</label><br>
        <input type="date" name="data de nascimento" id="data de nascimento"><br><br>
        <label for="data de falecimento">Data de Falecimento:</label><br>
        <input type="date" name="data de falecimento" id="data de falecimento"><br><br>
        <label for="cor do sangue">Cor do Sangue:</label><br>
        <input type="color" name="cor do sangue" id="cor do sangue"><br><br>
        <label for="sanidade">Sanidade Mental:</label><br>
        <input type="range" id="sanidade" name="sanidade" min="0" max="100"><br><br>
        <label for="foto">Foto da Cara no dia 30 de Fevereiro:</label><br>
        <input type="file" name="foto" id="foto"><br><br>
        <button type="submit">Enviar</button><br><br>
    </form>
</body>
</html>
