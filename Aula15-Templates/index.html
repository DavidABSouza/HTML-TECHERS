<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componente</title>
    <script src="PopupInfo.js"></script>
</head>

<body>
    <div>
        <popup-info>
            <span slot="meu-texto">Injeção dinâmica via Slot</span>
        </popup-info>
    </div>

    <template id="popup-template">
        <style>
            .wrapper { position: relative; display: inline-block; font-family: sans-serif; }
            .info {
                visibility: hidden; width: 200px; background: #2c3e50; color: #fff;
                text-align: center; padding: 10px; border-radius: 6px;
                position: absolute; z-index: 1; bottom: 125%; left: 50%;
                margin-left: -100px; opacity: 0; transition: opacity 0.3s;
            }
            .icon:hover + .info { visibility: visible; opacity: 1; }
        </style>

        <span class="wrapper">
            <span class="icon" tabindex="0">
                <img src="default.png" alt="Icone de informação">
            </span>

            <span class="info">
                <slot name="meu-texto">Texto padrão de fallback</slot>
            </span>
        </span>
    </template>
</body>
</html>
